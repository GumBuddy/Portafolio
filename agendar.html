<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Agenda una cita o asesoría con Angelo Azcorra para tu próximo proyecto de diseño o desarrollo.">
    <title>Agendar Cita | Angelo Azcorra</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Paleta Premium */
            --bg-dark: #070b14;
            --bg-darker: #02040a;
            --card-bg: rgba(15, 23, 42, 0.5);
            --accent-1: #3b82f6; /* Azul Dev */
            --accent-2: #8b5cf6; /* Morado */
            --accent-3: #ec4899; /* Rosa Design */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --whatsapp: #25D366;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-darker);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at top, rgba(30, 41, 59, 0.5) 0%, var(--bg-darker) 60%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientMove 5s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor Principal (Mobile First) */
        .form-wrapper {
            width: 100%;
            max-width: 650px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            animation: fadeInUp 0.8s ease-out;
            z-index: 1;
        }

        /* Cabecera */
        .header-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar-container {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-decoration: none;
            transition: var(--transition);
        }

        .avatar-container img {
            width: 75%;
            height: 75%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.35));
        }

        .avatar-container:hover {
            transform: translateY(-3px);
            border-color: var(--accent-2);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }

        .header-brand h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header-brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Contenedor del Formulario (Glassmorphism) */
        .glass-form {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Estilos de los Inputs */
        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            margin-left: 5px;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Estilo para arreglar el fondo blanco de las opciones en móviles/desktop */
        select.form-control option {
            background-color: var(--bg-darker);
            color: var(--text-main);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        /* Selector de Píldoras (Radio Buttons estéticos) */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill-label {
            position: relative;
            cursor: pointer;
        }

        .pill-label input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .pill-text {
            display: inline-block;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: var(--transition);
            user-select: none;
        }

        .pill-label:hover .pill-text {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .pill-label input[type="radio"]:checked ~ .pill-text {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            font-weight: 500;
        }

        /* Botón de Enviar (WhatsApp) */
        .btn-submit {
            width: 100%;
            background: var(--whatsapp);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4);
            background: #20b958;
        }

        .btn-submit i {
            font-size: 1.3rem;
        }

        /* Footer */
        footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
        }

        /* Animación */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decoración fondo Desktop */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
            display: none; 
        }

        /* Escalado a Desktop */
        @media (min-width: 768px) {
            .form-wrapper { padding: 60px 20px; }
            .glass-form { padding: 40px 50px; border-radius: 30px; }
            .glow-orb { display: block; }
            .orb-1 { top: 20%; left: 10%; width: 400px; height: 400px; background: rgba(139, 92, 246, 0.2); }
            .orb-2 { bottom: 10%; right: 10%; width: 400px; height: 400px; background: rgba(59, 130, 246, 0.2); }
        }
    </style>
</head>
<body>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="form-wrapper">
        
        <!-- Header -->
        <div class="header-brand">
            <a href="index.html" class="avatar-container" title="Volver al Inicio">
                <img src="Assets/Angelo Azcorra Identidad Visual.svg" alt="Angelo Azcorra Logo">
            </a>
            <h1>Construyamos algo <span class="text-gradient">Épico</span></h1>
            <p>Háblame un poco de tu idea. Prepararé una propuesta a medida y agendaremos una videollamada para afinar detalles.</p>
        </div>

        <!-- Formulario -->
        <div class="glass-form">
            <form id="projectForm">
                
                <div class="form-group">
                    <label for="clientName">¿Cómo te llamas o cómo se llama tu empresa?</label>
                    <input type="text" id="clientName" class="form-control" placeholder="Ej. Juan Pérez / TechCorp" required>
                </div>

                <div class="form-group">
                    <label>¿En qué te puedo ayudar hoy?</label>
                    <div class="pill-group">
                        <label class="pill-label">
                            <input type="radio" name="serviceType" value="Diseño de Logotipo / Identidad" required>
                            <span class="pill-text">Diseño de Logotipo</span>
                        </label>
                        <label class="pill-label">
                            <input type="radio" name="serviceType" value="Desarrollo de Sitio Web">
                            <span class="pill-text">Sitio Web</span>
                        </label>
                        <label class="pill-label">
                            <input type="radio" name="serviceType" value="Plataforma de Software / Web App">
                            <span class="pill-text">Software / Web App</span>
                        </label>
                        <label class="pill-label">
                            <input type="radio" name="serviceType" value="Identidad + Plataforma Web (Completo)">
                            <span class="pill-text">Diseño + Web (Completo)</span>
                        </label>
                        <label class="pill-label">
                            <input type="radio" name="serviceType" value="Asesoría Técnica / Auditoría">
                            <span class="pill-text">Asesoría Técnica</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="projectIdea">Cuéntame sobre tu proyecto (El problema a resolver o tu visión)</label>
                    <textarea id="projectIdea" class="form-control" placeholder="Tengo una idea para una plataforma que hace X, y necesito que se vea Y... Además mis clientes son..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="projectBudget">Presupuesto estimado (Aproximado, para ajustar la solución)</label>
                    <select id="projectBudget" class="form-control">
                        <option value="Aún lo estoy definiendo (Fase de exploración)">Aún lo estoy definiendo</option>
                        <option value="$2,500 - $5,000 MXN">$2,500 - $5,000 MXN</option>
                        <option value="$5,000 - $10,000 MXN">$5,000 - $10,000 MXN</option>
                        <option value="$10,000 - $25,000 MXN">$10,000 - $25,000 MXN</option>
                        <option value="Más de $25,000 MXN (Proyecto a gran escala)">Más de $25,000 MXN</option>
                    </select>
                </div>

                <!-- REEMPLAZA EL NÚMERO ABAJO EN EL JAVASCRIPT -->
                <button type="submit" class="btn-submit">
                    <i class="fab fa-whatsapp"></i> Enviar Brief por WhatsApp
                </button>

            </form>
        </div>

        <footer>
            Tus datos están seguros. Este formulario redirige tu consulta directamente a mi WhatsApp personal.
        </footer>

    </div>

    <script>
        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue

            // 1. REEMPLAZA ESTE NÚMERO CON TU WHATSAPP (código de país sin +, seguido del número)
            const myWhatsAppNumber = "529811426154"; 

            // 2. Recolectar datos del formulario
            const name = document.getElementById('clientName').value.trim();
            const service = document.querySelector('input[name="serviceType"]:checked').value;
            const idea = document.getElementById('projectIdea').value.trim();
            const budget = document.getElementById('projectBudget').value;

            // 3. Crear el mensaje con formato amigable para WhatsApp (*negritas*, emojis)
            const message = `👋 ¡Hola Angelo!\n\nMe interesa agendar una cita contigo. He llenado el formulario web y aquí te dejo los detalles de mi proyecto:\n\n👤 *Nombre/Empresa:*\n${name}\n\n🎯 *Servicio de interés:*\n${service}\n\n💡 *Sobre mi visión / proyecto:*\n${idea}\n\n💰 *Presupuesto estimado:*\n${budget}\n\n¡Quedo a la espera de tus comentarios para agendar!`;

            // 4. Codificar el mensaje para URL
            const encodedMessage = encodeURIComponent(message);

            // 5. Redirigir a la API de WhatsApp
            const whatsappUrl = `https://wa.me/${myWhatsAppNumber}?text=${encodedMessage}`;
            
            // Abre en una nueva pestaña (o app de WhatsApp en celulares)
            window.open(whatsappUrl, '_blank');
        });
    </script>

</body>
</html>
